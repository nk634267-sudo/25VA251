<body>
    
    <script>
        //IF Else
        let age = 32;
        if(age>=18){
            console.log("Elegible For Vote");
        }
        else{
            console.log("Not Elegible For Vote");
        }

        //Switch Case
        let grade = "A";
        switch(grade){
            case 'A': result = "FIRST DIV";
            break;
            case 'B': result = "SEC DIV";
            break;
            case 'C': result = "THIRD DIV";
            break;
            default: result = "FAIL";
        }
        console.log(result);

        //if else if
        
        let marks = 65;
        if(marks>=60){
            console.log("First DIV Marks");
        }
        else if(marks < 60 && marks>=40){
            console.log("Sec DIV Marks");
        }
        else if(marks<40 && marks >= 30){
            console.log("THIRD DIV marks");
        }
        else{
            console.log("Fail");
        }

    </script>
