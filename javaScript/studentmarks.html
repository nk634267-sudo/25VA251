<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
   
    <script>
        let marks = [90,40,20,60,50];

        let sum = 0;
        let avg = 0;
        for(let i in marks){
            sum += marks[i];
        }
        avg = sum/marks.length;


        if(avg>=60){
            console.log("First DIV Marks");
        }
        else if(avg < 60 && avg>=40){
            console.log("Sec DIV Marks");
        }
        else if(avg<40 && avg >= 30){
            console.log("THIRD DIV marks");
        }
        else{
            console.log("Fail");
        }
        
    </script>
</body>
</html>
